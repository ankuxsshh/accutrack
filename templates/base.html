<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        ACCUTRACK
      {% endblock %}
    </title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css" />
    <!-- For example, using Quicksand font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Information Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
      <div class="container-fluid">
        <div class="contact-info d-flex align-items-center">
          <span class="tnavbar-ext me-3 text-secondary"><i class="fa-regular fa-envelope"></i> razak@accutrack.ae</span>
          <span class="navbar-text text-secondary"><i class="fa-solid fa-phone"></i> +971 581 825 985</span>
        </div>

        <div class="searchBox d-flex align-items-center">
          <input class="searchInput" type="text" placeholder=" Search..." />
          <button class="searchButton"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </div>
    </nav>

    <!-- Information Navbar -->
    <section>
      <nav class="navbar navbar-expand-lg info-navbar">
        <a class="navbar-brand" href="#"><img src="static/images/logo.jpg" alt="ACCUTRACK" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto">
            <!-- Center-aligned items -->
            <li class="nav-item active">
              <a class="nav-link" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Gallery</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact Us</a>
            </li>
          </ul>
        </div>
      </nav>
    </section>

    <!-- WhatsApp and Call Buttons -->
    <div class="fixed-buttons">
      <a href="tel:+919895533884" class="btn-whatsapp-pulse call-button" aria-label="Call Us"><i class="fa-solid fa-phone"></i></a>
      <a href="https://wa.me/+919895533884" class="btn-whatsapp-pulse whatsapp-button" aria-label="WhatsApp Us"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

      {% block content %}
      
      {% endblock %}

    <!-- Footer (Optional) -->
    <footer class="bg-light py-4 mt-5" style="box-shadow: 0px 2px 6px 4px rgba(0, 0, 0, 0.1);">
      <div class="container text-center">
        <p>&copy; 2024 ACCUTRACK. All rights reserved. | Designed and Developed by <a href="https://inspirezesttechnologies.com/">Inspirezest Technologies</a></p>
      </div>
    </footer>

    <!-- Bootstrap JS (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
